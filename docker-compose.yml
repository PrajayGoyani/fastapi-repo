name: fastapi-stack
services:
  api:
    build: . # Builds an image from the Dockerfile in the current directory (.)
    ports:
      - "8000:8000" # "host_port:container_port"
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: 1 # Not to write .pyc bytecode files, save disk space
      PYTHONUNBUFFERED: 1 # Makes Python output unbuffered, logs appear immediately 
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:
